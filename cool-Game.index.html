<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cool Clicker Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #ffd700; --purple: #a855f7; --bg: #0a0a0c; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; user-select: none; }
        
        /* Статистика */
        .stats { width: 100%; background: #1a1a1c; border-radius: 20px; padding: 15px; text-align: center; border: 1px solid #333; margin-bottom: 15px; }
        #balance { font-size: 36px; color: var(--gold); font-weight: bold; margin: 5px 0; }
        .lvl-bar { width: 100%; height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin-top: 10px; }
        #lvl-fill { width: 0%; height: 100%; background: var(--purple); transition: 0.4s; }

        /* Кликер */
        #main-tap { width: 180px; filter: drop-shadow(0 0 15px rgba(168, 85, 247, 0.4)); cursor: pointer; transition: 0.1s; margin: 20px 0; border-radius: 50%; }
        #main-tap:active { transform: scale(0.9); }

        /* Вкладки */
        .tabs { display: flex; width: 100%; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px; background: #222; border: none; color: #888; border-radius: 12px; font-weight: bold; font-size: 12px; }
        .tab-btn.active { background: var(--purple); color: white; }

        .section { display: none; width: 100%; max-width: 400px; }
        .section.active { display: block; }

        /* Карточки (Кейсы и Магазин) */
        .item-card { background: #111; border-radius: 15px; padding: 15px; margin-bottom: 10px; border: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .info b { display: block; font-size: 16px; }
        .info small { color: #a855f7; font-weight: bold; }

        /* Инвентарь */
        .inv-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .slot { aspect-ratio: 1; background: #111; border-radius: 10px; border: 1px solid #333; overflow: hidden; position: relative; }
        .slot img { width: 100%; height: 100%; object-fit: cover; animation: pulse 3s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); filter: brightness(1.2); } }

        .sell-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(255,0,0,0.6); display: none; align-items: center; justify-content: center; font-size: 9px; cursor: pointer; }
        .slot:hover .sell-overlay { display: flex; }

        button.buy-btn { background: var(--purple); color: white; border: none; padding: 10px 15px; border-radius: 10px; font-weight: bold; }
        button:disabled { background: #333; color: #666; }
    </style>
</head>
<body>

    <div class="stats">
        <div id="lvl-txt" style="font-size: 12px; color: #888;">Уровень 1</div>
        <div id="balance">0</div>
        <div style="font-size: 12px; color: #888;">Монет накоплено</div>
        <div class="lvl-bar"><div id="lvl-fill"></div></div>
    </div>

    <img id="main-tap" src="2.jpg">

    <div class="tabs">
        <button class="tab-btn active" onclick="show('shop', this)">МАГАЗИН</button>
        <button class="tab-btn" onclick="show('cases', this)">КЕЙСЫ</button>
        <button class="tab-btn" onclick="show('inv', this)">ИНВЕНТАРЬ</button>
    </div>

    <!-- МАГАЗИН (Улучшения) -->
    <div id="shop" class="section active">
        <div class="item-card">
            <div class="info">
                <b>Сила клика</b>
                <small id="click-cost">100 💎</small>
            </div>
            <button class="buy-btn" onclick="upgradeClick()">Улучшить</button>
        </div>
        <div class="item-card">
            <div class="info">
                <b>Авто-майнер</b>
                <small id="auto-cost">500 💎</small>
            </div>
            <button class="buy-btn" onclick="upgradeAuto()">Улучшить</button>
        </div>
    </div>

    <!-- КЕЙСЫ -->
    <div id="cases" class="section">
        <!-- Кейсы генерируются через JS -->
    </div>

    <!-- ИНВЕНТАРЬ -->
    <div id="inv" class="section">
        <div class="inv-grid" id="inv-grid"></div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let state = JSON.parse(localStorage.getItem('cool_game_save')) || {            balance: 0,
            lvl: 1,
            exp: 0,
            clickPower: 1,
            autoPower: 0,
            upgClickPrice: 100,
            upgAutoPrice: 500,
            inv: []
        };

        const items = {
            1: { n: "Дракон", p: 50000, img: "1.jpg" },
            3: { n: "Кристалл", p: 5000, img: "3.jpg" },
            4: { n: "Волк", p: 200000, img: "4.jpg" },
            5: { n: "Акула", p: 100000, img: "5.jpg" },
            6: { n: "ГОРИЛЛА", p: 10000000, img: "6.jpg" }, // Шанс 0.1%
            10: { n: "Сова", p: 15000, img: "10.jpg" }
        };

        const caseList = [
            { n: "Обычный", p: 1000, drop: [3, 10] },
            { n: "Редкий", p: 10000, drop: [10, 5, 1] },
            { n: "Элитный (10)", p: 1000000, drop: [1, 4, 6] }
        ];

        function update() {
            document.getElementById('balance').innerText = Math.floor(state.balance).toLocaleString();
            document.getElementById('lvl-txt').innerText = `Уровень ${state.lvl} (Клик: +${state.clickPower})`;
            document.getElementById('click-cost').innerText = state.upgClickPrice + " 💎";
            document.getElementById('auto-cost').innerText = state.upgAutoPrice + " 💎";
            
            let nextLvl = state.lvl * 5000;
            document.getElementById('lvl-fill').style.width = (state.exp / nextLvl * 100) + "%";
            
            localStorage.setItem('cool_game_save', JSON.stringify(state));
      }// ТАП
        document.getElementById('main-tap').onclick = () => {
            addMoney(state.clickPower);
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        };

        function addMoney(amt) {
            state.balance += amt;
            state.exp += amt;
            if(state.exp >= state.lvl * 5000) {
                state.exp = 0;
                state.lvl++;
                tg.showAlert(`Уровень ${state.lvl} достигнут!`);
            }
            update();
        }

        // МАГАЗИН
        function upgradeClick() {
            if(state.balance >= state.upgClickPrice) {
                state.balance -= state.upgClickPrice;
                state.clickPower += 1;
                state.upgClickPrice *= 2;
                update();
            }
        }

        function upgradeAuto() {
            if(state.balance >= state.upgAutoPrice) {
                state.balance -= state.upgAutoPrice;
                state.autoPower += 1;
                state.upgAutoPrice *= 2;
                update();
            }
        }

        // АВТО-КЛИК
        setInterval(() => {
            if(state.autoPower > 0) addMoney(state.autoPower);
        }, 1000);

        // КЕЙСЫ
        function renderCases() {
            let h = '';
            caseList.forEach((c, i) => {
                h += `<div class="item-card">
                    <div class="info"><b>${c.n}</b><small>${c.p} 💎</small></div>
                    <button class="buy-btn" onclick="openCase(${i})">Открыть</button>
                </div>`;
            });
            document.getElementById('cases').innerHTML = h;
        }

        function openCase(i) {
            let c = caseList[i];
            if(state.balance < c.p) return tg.showAlert("Мало монет!");
            state.balance -= c.p;
            
            let dropId = c.drop[Math.floor(Math.random() * c.drop.length)];
            // Шанс на Гориллу
            if(dropId === 6 && Math.random() > 0.01) dropId = c.drop[0];

            state.inv.push({...items[dropId], id: Date.now()});
            update();
            tg.showAlert("Выпало: " + items[dropId].n);
        }

        // ИНВЕНТАРЬ
        function renderInv() {
            let g = document.getElementById('inv-grid');
            g.innerHTML = '';
            state.inv.forEach((it, idx) => {
                g.innerHTML += `<div class="slot">
                    <img src="${it.img}">
                    <div class="sell-overlay" onclick="sell(${idx})">ПРОДАТЬ<br>${it.p/2}</div>
                </div>`;
            });
        }

        function sell(idx) {
            state.balance += state.inv[idx].p / 2;
            state.inv.splice(idx, 1);
            update();
            renderInv();
        }

        function show(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            if(id === 'inv') renderInv();
            if(id === 'cases') renderCases();
        }

        update();
    </script>
</body>
</html>
