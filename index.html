<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Soul Tycoon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        #score { font-size: 35px; color: #a855f7; font-weight: bold; text-shadow: 0 0 10px #a855f7; }
        #lvl { color: #888; font-size: 14px; }
        
        /* Анимация пульсации для всех существ */
        @keyframes soulBreath {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.05); filter: brightness(1.2); box-shadow: 0 0 20px #a855f7; }
        }

        .main-crystal { width: 160px; margin: 15px; cursor: pointer; transition: 0.1s; border-radius: 50%; }
        .main-crystal:active { transform: scale(0.9); }

        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; background: #222; color: white; }
        .tab-btn.active { background: #a855f7; font-weight: bold; }

        .section { display: none; }
        .section.active { display: block; }

        .item-card { background: #111; border: 1px solid #333; padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        
        .inv-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .slot { aspect-ratio: 1; background: #0a0a0a; border: 1px solid #333; border-radius: 8px; position: relative; overflow: hidden; }
        .slot img { width: 100%; height: 100%; object-fit: cover; animation: soulBreath 3s infinite ease-in-out; }
        
        .sell-btn { position: absolute; bottom: 0; width: 100%; background: rgba(255,0,0,0.8); color: white; font-size: 8px; border: none; padding: 4px 0; }
        
        button.buy { background: #a855f7; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="score">0</div>
    <div id="lvl">Уровень 1</div>

    <!-- Твое фото №2 как главный кристалл -->
    <img src="2.jpg" class="main-crystal" id="tap-btn">

    <div class="tabs">
        <button class="tab-btn active" id="b-cases" onclick="show('cases')">КЕЙСЫ</button>
                <button class="tab-btn" id="btn-inv" onclick="show('inv')">ИНВЕНТАРЬ</button>
    </div>

    <div id="cases" class="section active"></div>
    <div id="inv" class="section">
        <div class="inv-grid" id="inv-grid"></div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let data = JSON.parse(localStorage.getItem('crystal_god_save')) || { score: 0, lvl: 1, exp: 0, inv: [] };

        // ТВОИ КАРТИНКИ (замени ссылки на свои из Glitch Assets)
        const items = {
            1: { n: "Дракон", p: 200000, img: "https://i.ibb.co/vz6C1mP/dragon.jpg" },
            2: { n: "Кристалл", p: 10000, img: "https://i.ibb.co/0YmYpYp/crystal.jpg" },
            3: { n: "Волк", p: 500000, img: "https://i.ibb.co/3Y7Lz9d/wolf.jpg" },
            4: { n: "Акула", p: 150000, img: "https://i.ibb.co/yPz0mXn/shark.jpg" },
            5: { n: "Жаба", p: 5000, img: "https://i.ibb.co/pPz0mXn/toad.jpg" },
            6: { n: "ГОРИЛЛА", p: 1000000000, img: "https://i.ibb.co/vXz0mXn/gorilla.jpg" }
        };

        const cases = [
            { n: "Кейс 1", p: 500, drop: [5, 2] },
            { n: "Кейс 5", p: 50000, drop: [4, 2] },
            { n: "Кейс 10 (УЛЬТРА)", p: 10000000, drop: [1, 3, 6] }
        ];

        function update() {
            document.getElementById('score').innerText = Math.floor(data.score).toLocaleString();
            document.getElementById('lvl').innerText = `Уровень ${data.lvl}`;
            localStorage.setItem('crystal_god_save', JSON.stringify(data));
        }

        document.getElementById('clicker').onclick = () => {
            let gain = data.lvl * 5;
            data.score += gain;
            data.exp += gain;
            if(data.exp >= data.lvl * 10000) {
                data.lvl++;
                data.exp = 0;
                tg.showAlert("УРОВЕНЬ ПОВЫШЕН!");
            }
            update();
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        };

        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                      document.getElementById(id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
            if(id === 'inv') renderInv();
        }

        function renderCases() {
            let html = '';
            cases.forEach((c, i) => {
                html += `<div class="card">
                    <div><b>${c.n}</b><br><small>${c.p.toLocaleString()} 💎</small></div>
                    <button class="buy" onclick="openCase(${i})">ОТКРЫТЬ</button>
                </div>`;
            });
            document.getElementById('cases').innerHTML = html;
        }

        function openCase(i) {
            let c = cases[i];
            if(data.score < c.p) return tg.showAlert("Мало кристаллов!");
            if(data.inv.length >= 40) return tg.showAlert("Инвентарь полон!");

            data.score -= c.p;
            let dropId = c.drop[Math.floor(Math.random() * c.drop.length)];
            
            // Сверх-маленький шанс на Гориллу (0.1%)
            if(dropId === 6 && Math.random() > 0.001) dropId = c.drop[0];

            data.inv.push({...items[dropId], id: Date.now()});
            update();
            tg.showAlert("ВЫПАЛО: " + items[dropId].n);
        }

        function renderInv() {
            let grid = document.getElementById('inv-grid');
            grid.innerHTML = '';
            data.inv.forEach((item, index) => {
                grid.innerHTML += `<div clas s="slot">
                    <img src="${item.img}">
                    <button class="sell-btn" onclick="sell(${index})">ПРОДАТЬ</button>
                </div>`;
            });
        }

        function sell(i) {
            data.score += data.inv[i].p;
            data.inv.splice(i, 1);
            update();
            renderInv();
        }

        renderCases();
        update();
    </script>
</body>
</html>
